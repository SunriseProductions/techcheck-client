name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Linux deps for Wails
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Test
        run: go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ''
            # ubuntu-24.04 ships libwebkit2gtk-4.1; Wails 2.10+ adapts via this tag.
            tags: '-tags webkit2_41'
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            tags: ''
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ''
            tags: ''
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            tags: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Install Linux deps
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
      - name: Build
        working-directory: cmd/techcheck
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: wails build ${{ matrix.tags }} -platform ${{ matrix.goos }}/${{ matrix.goarch }}
      - name: Rename artifact
        working-directory: cmd/techcheck
        shell: bash
        run: |
          set -e
          mkdir -p artifact
          version="${GITHUB_REF_NAME:-dev}"
          src_candidates=(
            "build/bin/SunriseTechCheck${{ matrix.ext }}"
            "build/bin/SunriseTechCheck.app"
          )
          for src in "${src_candidates[@]}"; do
            if [ -e "$src" ]; then
              dest="artifact/SunriseTechCheck-${version}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
              if [ -d "$src" ]; then
                # .app is a bundle — tarball it so upload-artifact preserves structure.
                tar -czf "${dest}.tar.gz" -C build/bin "$(basename "$src")"
              else
                cp "$src" "$dest"
              fi
              break
            fi
          done
          ls -la artifact/
      - uses: actions/upload-artifact@v4
        with:
          name: SunriseTechCheck-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cmd/techcheck/artifact/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
